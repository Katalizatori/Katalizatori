<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-label="Terminal banner: elma@tirana running neofetch">
  <defs>
    <style>
      .term { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Source Code Pro', 'Consolas', 'Menlo', monospace; font-size: 14px; }
      .fg     { fill: #ebdbb2; }
      .red    { fill: #fb4934; }
      .green  { fill: #b8bb26; }
      .yellow { fill: #fabd2f; }
      .blue   { fill: #83a598; }
      .purple { fill: #d3869b; }
      .aqua   { fill: #8ec07b; }
      .gray   { fill: #928374; }
      .orange { fill: #fe8019; }
      .bold   { font-weight: 700; }
      @keyframes blink { 50% { opacity: 0; } }
      .cursor { animation: blink 1s steps(2) infinite; }
    </style>
  </defs>

  <!-- terminal window -->
  <rect width="900" height="360" rx="10" fill="#282828"/>
  <!-- titlebar -->
  <rect width="900" height="28" rx="10" fill="#1d2021"/>
  <rect y="20" width="900" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="6" fill="#fb4934"/>
  <circle cx="40" cy="14" r="6" fill="#fabd2f"/>
  <circle cx="62" cy="14" r="6" fill="#b8bb26"/>
  <text x="450" y="18" text-anchor="middle" class="term gray" font-size="12">elma@tirana: ~</text>

  <!-- prompt: neofetch -->
  <text x="20" y="58" class="term">
    <tspan class="green bold">elma@tirana</tspan><tspan class="fg">:</tspan><tspan class="blue bold">~</tspan><tspan class="fg">$ neofetch</tspan>
  </text>

  <!-- ASCII art (left column) - monitor on stand with mini terminal on screen -->
  <g class="term yellow" font-size="13" xml:space="preserve">
    <text x="20" y="92">┌─────────────┐</text>
    <text x="20" y="108">│ ┌─────────┐ │</text>
    <text x="20" y="124">│ │ &gt; _     │ │</text>
    <text x="20" y="140">│ │ $ ls    │ │</text>
    <text x="20" y="156">│ │ code/   │ │</text>
    <text x="20" y="172">│ └─────────┘ │</text>
    <text x="20" y="188">└──────┬──────┘</text>
    <text x="20" y="204">   ┌───┴───┐</text>
    <text x="20" y="220">   └───────┘</text>
  </g>

  <!-- info column (right) -->
  <g class="term" font-size="14">
    <!-- header line -->
    <text x="240" y="92">
      <tspan class="green bold">elma</tspan><tspan class="fg">@</tspan><tspan class="green bold">tirana</tspan>
    </text>
    <text x="240" y="108" class="gray">─────────────────────────────────────</text>

    <text x="240" y="128"><tspan class="yellow bold">Role</tspan><tspan class="fg">: Full-Stack Developer · Final-yr CS</tspan></text>
    <text x="240" y="148"><tspan class="yellow bold">Location</tspan><tspan class="fg">: Tirana, Albania</tspan></text>
    <text x="240" y="168"><tspan class="yellow bold">Uni</tspan><tspan class="fg">: University of Tirana (prev. NYUA)</tspan></text>
    <text x="240" y="188"><tspan class="yellow bold">Editor</tspan><tspan class="fg">: nvim · git · the terminal</tspan></text>
    <text x="240" y="208"><tspan class="yellow bold">Shipping</tspan><tspan class="fg">: Django · Vue · Python · Java</tspan></text>
    <text x="240" y="228"><tspan class="yellow bold">Learning</tspan><tspan class="fg">: Spring Boot · agentic workflows</tspan></text>
    <text x="240" y="248"><tspan class="yellow bold">Langs</tspan><tspan class="fg">: sq · en (C1) · fr (B2) · de (A2)</tspan></text>

    <!-- color swatches like real neofetch -->
    <g>
      <rect x="240" y="262" width="20" height="14" fill="#282828"/>
      <rect x="262" y="262" width="20" height="14" fill="#fb4934"/>
      <rect x="284" y="262" width="20" height="14" fill="#b8bb26"/>
      <rect x="306" y="262" width="20" height="14" fill="#fabd2f"/>
      <rect x="328" y="262" width="20" height="14" fill="#83a598"/>
      <rect x="350" y="262" width="20" height="14" fill="#d3869b"/>
      <rect x="372" y="262" width="20" height="14" fill="#8ec07b"/>
      <rect x="394" y="262" width="20" height="14" fill="#ebdbb2"/>
    </g>
  </g>

  <!-- final prompt with blinking cursor -->
  <text x="20" y="320" class="term">
    <tspan class="green bold">elma@tirana</tspan><tspan class="fg">:</tspan><tspan class="blue bold">~</tspan><tspan class="fg">$ </tspan><tspan class="orange">whoami</tspan>
  </text>
  <rect x="220" y="310" width="9" height="14" class="fg cursor"/>
</svg>
