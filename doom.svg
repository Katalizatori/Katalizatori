  <text x="794" y="72" class="term sm yellow b">Week-agenda (W18):</text>
  <text x="794" y="90" class="term sm dim">─────────────────────────────────</text>

  <!-- agenda items -->
  <!-- Mon -->
  <text x="794" y="112" class="term sm">
    <tspan class="dim b">Monday</tspan> <tspan class="dim">  27 April 2026</tspan>
  </text>
  <text x="794" y="130" class="term sm">
    <tspan class="dim">  experience:</tspan> <tspan class="green b">DONE</tspan> <tspan class="fg">Mailchimp i…</tspan>
  </text>

