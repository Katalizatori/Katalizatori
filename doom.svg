<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" role="img" aria-label="Doom Emacs with org-mode experience file and agenda sidebar">
  <defs>
    <style>
      .term { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Source Code Pro', 'Consolas', 'Menlo', monospace; font-size: 12px; }
      .sm   { font-size: 11px; }
      .xs   { font-size: 10px; }
      .b    { font-weight: 700; }
      .it   { font-style: italic; }

      /* doom-one palette */
      .fg     { fill: #bbc2cf; }
      .dim    { fill: #5b6268; }
      .gray   { fill: #3f444a; }
      .red    { fill: #ff6c6b; }
      .green  { fill: #98be65; }
      .yellow { fill: #ECBE7B; }
      .orange { fill: #da8548; }
      .blue   { fill: #51afef; }
      .magenta{ fill: #c678dd; }
      .cyan   { fill: #46D9FF; }
      .violet { fill: #a9a1e1; }

      @keyframes blink { 50% { opacity: 0; } }
      .cursor { animation: blink 1.05s steps(2) infinite; }
    </style>
  </defs>

  <!-- terminal window -->
  <rect width="1100" height="800" rx="10" fill="#282c34"/>

  <!-- titlebar -->
  <rect width="1100" height="28" rx="10" fill="#21242b"/>
  <rect y="20" width="1100" height="8" fill="#21242b"/>
  <circle cx="18" cy="14" r="6" fill="#ff6c6b"/>
  <circle cx="40" cy="14" r="6" fill="#ECBE7B"/>
  <circle cx="62" cy="14" r="6" fill="#98be65"/>
  <text x="550" y="18" text-anchor="middle" class="term dim xs">elma@tirana: ~/org — Doom Emacs</text>

  <!-- ============ MAIN PANE: experience.org ============ -->
  <!-- buffer header -->
  <rect x="0" y="28" width="780" height="22" fill="#21242b"/>
  <text x="14" y="44" class="term sm violet b">  experience.org</text>
  <line x1="780" y1="28" x2="780" y2="772" stroke="#3f444a" stroke-width="1"/>

  <!-- title block -->
  <text x="20" y="72" class="term yellow b">#+TITLE: Experience &amp; Contributions</text>
  <text x="20" y="90" class="term yellow">#+AUTHOR: Elma Guga</text>
  <text x="20" y="108" class="term yellow">#+STARTUP: showall</text>
  <text x="20" y="126" class="term yellow">#+TODO: TODO IN-PROGRESS | DONE SHIPPED</text>

  <!-- TOP-LEVEL: Client Work -->
  <text x="20" y="158" class="term"><tspan class="cyan b">* Client Work</tspan></text>

  <!-- Christian Fundraising Foundation -->
  <text x="20" y="180" class="term">
    <tspan class="cyan">**</tspan> <tspan class="green b">SHIPPED</tspan> <tspan class="fg">Christian Fundraising Foundation</tspan> <tspan class="violet">:django:nonprofit:</tspan>
  </text>
  <text x="20" y="198" class="term sm dim">  CLOSED: [2025-02-14 Fri]</text>
  <text x="20" y="216" class="term sm">    <tspan class="dim">:PROPERTIES:</tspan></text>
  <text x="20" y="234" class="term sm">    <tspan class="dim">:ROLE:     Sole developer</tspan></text>
  <text x="20" y="252" class="term sm">    <tspan class="dim">:STACK:    Django · Tailwind · PostgreSQL · Render</tspan></text>
  <text x="20" y="270" class="term sm">    <tspan class="dim">:LINK:     [[https://github.com/Katalizatori/christian-fundraising-foundation][repo]]</tspan></text>
  <text x="20" y="288" class="term sm">    <tspan class="dim">:END:</tspan></text>
  <text x="20" y="306" class="term sm fg">    Production site for a real nonprofit. Mobile-responsive, brand-aligned</text>
  <text x="20" y="324" class="term sm fg">    front end, Mailchimp subscription flow, custom admin, data models built</text>
  <text x="20" y="342" class="term sm fg">    around the client's actual operations.</text>

  <!-- TOP-LEVEL: Open Source -->
  <text x="20" y="372" class="term"><tspan class="cyan b">* Open Source</tspan></text>

  <!-- Sentence Stepper -->
  <text x="20" y="394" class="term">
    <tspan class="cyan">**</tspan> <tspan class="orange b">IN-PROGRESS</tspan> <tspan class="fg">sentence-stepper contribution</tspan> <tspan class="violet">:a11y:browser-ext:</tspan>
  </text>
  <text x="20" y="412" class="term sm dim">  SCHEDULED: &lt;2026-05-06 Wed&gt;</text>
  <text x="20" y="430" class="term sm">    <tspan class="dim">:STACK:    JavaScript · Firefox / Chrome WebExt API</tspan></text>
  <text x="20" y="448" class="term sm fg">    PDF recognition for the reading-rule extension. Currently porting the</text>
  <text x="20" y="466" class="term sm fg">    same logic into a Calibre plugin for ebooks.</text>

  <!-- AI Moderation System -->
  <text x="20" y="492" class="term">
    <tspan class="cyan">**</tspan> <tspan class="green b">SHIPPED</tspan> <tspan class="fg">AI Moderation System</tspan> <tspan class="violet">:python:fullstack:</tspan>
  </text>
  <text x="20" y="510" class="term sm dim">  CLOSED: [2024-11-22 Fri]</text>
  <text x="20" y="528" class="term sm">    <tspan class="dim">:STACK:    Django REST · Vue 3 · OpenAI API</tspan></text>
  <text x="20" y="546" class="term sm fg">    Auto-moderates user reviews. REST backend exposes a flagging pipeline,</text>
  <text x="20" y="564" class="term sm fg">    Vue admin UI surfaces decisions for human review.</text>

  <!-- TOP-LEVEL: University -->
  <text x="20" y="590" class="term"><tspan class="cyan b">* University</tspan></text>

  <!-- DMS (Web Project) -->
  <text x="20" y="612" class="term">
    <tspan class="cyan">**</tspan> <tspan class="green b">SHIPPED</tspan> <tspan class="fg">Document Management System</tspan> <tspan class="violet">:php:team-lead:</tspan>
  </text>
  <text x="20" y="630" class="term sm dim">  CLOSED: [2025-06-12 Thu]</text>
  <text x="20" y="648" class="term sm">    <tspan class="dim">:ROLE:     Team lead</tspan></text>
  <text x="20" y="666" class="term sm">    <tspan class="dim">:STACK:    PHP · HTML · CSS · JavaScript · MySQL</tspan></text>
  <text x="20" y="684" class="term sm fg">    Course-project DMS with AI-assisted file search, sharing,</text>
  <text x="20" y="702" class="term sm fg">    and real password reset over SMTP.</text>

  <!-- GIS Treasure Map Finder -->
  <text x="20" y="728" class="term">
    <tspan class="cyan">**</tspan> <tspan class="orange b">IN-PROGRESS</tspan> <tspan class="fg">GIS Treasure Map Finder</tspan> <tspan class="violet">:gis:maps:</tspan> <tspan class="fg cursor">█</tspan>
  </text>
  <text x="20" y="746" class="term sm dim">  SCHEDULED: &lt;2026-06-01 Mon&gt;</text>
  <text x="20" y="764" class="term sm fg">    Geo-puzzle app: solve clues to pin treasures on a live map.</text>

  <!-- ============ SIDEBAR: Agenda ============ -->
  <rect x="780" y="28" width="320" height="744" fill="#21242b"/>
  <text x="794" y="44" class="term sm violet b">  *Org Agenda*</text>

