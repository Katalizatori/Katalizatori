  </text>
  <text x="794" y="222" class="term sm">
    <tspan class="dim">  experience:</tspan> <tspan class="orange b">WIP</tspan> <tspan class="fg">stepper PDF</tspan>
  </text>

  <!-- Thu -->
  <text x="794" y="248" class="term sm">
    <tspan class="dim b">Thursday</tspan> <tspan class="dim">30 April 2026</tspan>
  </text>
  <text x="794" y="266" class="term sm">
    <tspan class="dim">  uni:</tspan> <tspan class="yellow b">TODO</tspan> <tspan class="fg">DSA assignment</tspan>
  </text>

  <!-- Fri -->
  <text x="794" y="292" class="term sm">
    <tspan class="dim b">Friday</tspan> <tspan class="dim">  01 May 2026</tspan>
  </text>
  <text x="794" y="310" class="term sm">
    <tspan class="dim">  uni:</tspan> <tspan class="yellow b">TODO</tspan> <tspan class="fg">OS midterm</tspan>
  </text>

  <!-- Sat -->
  <text x="794" y="336" class="term sm">
    <tspan class="dim b">Saturday</tspan> <tspan class="dim">02 May 2026</tspan>
  </text>

  <!-- Sun -->
  <text x="794" y="360" class="term sm">
    <tspan class="dim b">Sunday</tspan> <tspan class="dim">  03 May 2026</tspan>
  </text>
  <text x="794" y="378" class="term sm">
    <tspan class="dim">  experience:</tspan> <tspan class="orange b">WIP</tspan> <tspan class="fg">calibre port</tspan>
  </text>

  <!-- divider -->
  <text x="794" y="408" class="term sm dim">─────────────────────────────────</text>

  <!-- summary box -->
  <text x="794" y="430" class="term sm yellow b">Stats:</text>
  <text x="794" y="450" class="term sm">
    <tspan class="dim">  shipped this term:</tspan> <tspan class="green b">4</tspan>
  </text>
  <text x="794" y="468" class="term sm">
    <tspan class="dim">  in progress:</tspan>       <tspan class="orange b">2</tspan>
  </text>
  <text x="794" y="486" class="term sm">
    <tspan class="dim">  on deck:</tspan>           <tspan class="yellow b">4</tspan>
  </text>

  <!-- divider -->
  <text x="794" y="514" class="term sm dim">─────────────────────────────────</text>

  <!-- legend -->
  <text x="794" y="534" class="term sm yellow b">Legend:</text>
  <text x="794" y="554" class="term sm">
    <tspan class="green b">SHIPPED</tspan>     <tspan class="dim">— in production</tspan>
  </text>
  <text x="794" y="572" class="term sm">
    <tspan class="orange b">IN-PROGRESS</tspan> <tspan class="dim">— actively building</tspan>
  </text>
  <text x="794" y="590" class="term sm">
    <tspan class="yellow b">TODO</tspan>        <tspan class="dim">— planned / next</tspan>
  </text>

  <!-- ============ MODELINE (doom-modeline-ish) ============ -->
  <rect x="0" y="772" width="1100" height="22" fill="#1c1f24"/>
  <!-- mode -->
  <rect x="0" y="772" width="68" height="22" fill="#51afef"/>
  <text x="34" y="788" text-anchor="middle" class="term sm b" fill="#21242b">NORMAL</text>
  <!-- buffer -->
  <text x="78" y="788" class="term sm fg">⎇ main</text>
  <text x="140" y="788" class="term sm dim">experience.org</text>
  <text x="260" y="788" class="term sm green">All</text>
  <!-- right side -->
  <rect x="950" y="772" width="68" height="22" fill="#3f444a"/>
  <text x="984" y="788" text-anchor="middle" class="term sm fg">Org</text>
  <rect x="1018" y="772" width="82" height="22" fill="#ECBE7B"/>
  <text x="1059" y="788" text-anchor="middle" class="term sm b" fill="#21242b">L34 W4</text>
</svg>
