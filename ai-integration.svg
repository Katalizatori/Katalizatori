  <!-- markdown header -->
  <text x="20" y="92" class="term sm yellow b"># Working w/ AI</text>
  <line x1="20" x2="1080" y1="106" y2="106" stroke="#3c3836" stroke-width="1"/>

<!-- ===== PARAGRAPH 1 ===== -->
  <text x="20" y="138" class="term sm fg">My internship at a public institution proved that AI integration is inevitable. Watching seasoned devs</text>
  <text x="20" y="158" class="term sm fg">agree so unanimously was eye-opening. I spend my time there building efficient agent workflows and</text>
  <text x="20" y="178" class="term sm fg">learning the ticks and gaps these systems have. This is the single skill all juniors must adapt, lest</text>
  <text x="20" y="198" class="term sm fg">their skillset get automated away. Understanding the "how" is the only way to ensure everything</text>
  <text x="20" y="218" class="term sm fg">actually runs smoothly in a production environment.</text>

  <!-- ===== PARAGRAPH 2 ===== -->
  <text x="20" y="254" class="term sm fg">The field of AI is currently a relay race, where companies pass the baton to each other in a matter of</text>
  <text x="20" y="274" class="term sm fg">months. The keen eye of a developer is needed to discern who will take the lead next, and how to</text>
  <text x="20" y="294" class="term sm fg">leverage that momentum at an enterprise level.</text>

