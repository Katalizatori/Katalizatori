<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 380" role="img" aria-label="cat ai-integration.md — how I work with AI and why I'm a generalist">
  <defs>
    <style>
      .term { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Source Code Pro', 'Consolas', 'Menlo', monospace; font-size: 13px; }
      .sm   { font-size: 12px; }
      .xs   { font-size: 11px; }
      .b    { font-weight: 700; }
      .it   { font-style: italic; }

      .fg     { fill: #ebdbb2; }
      .dim    { fill: #a89984; }
      .gray   { fill: #7c6f64; }
      .red    { fill: #fb4934; }
      .green  { fill: #b8bb26; }
      .yellow { fill: #fabd2f; }
      .blue   { fill: #83a598; }
      .orange { fill: #fe8019; }

      @keyframes blink { 50% { opacity: 0; } }
      .cursor { animation: blink 1.05s steps(2) infinite; }
    </style>
  </defs>

  <!-- terminal window -->
  <rect width="1100" height="380" rx="10" fill="#282828"/>

  <!-- titlebar -->
  <rect width="1100" height="28" rx="10" fill="#1d2021"/>
  <rect y="20" width="1100" height="8" fill="#1d2021"/>
  <circle cx="18" cy="14" r="6" fill="#fb4934"/>
  <circle cx="40" cy="14" r="6" fill="#fabd2f"/>
  <circle cx="62" cy="14" r="6" fill="#b8bb26"/>
  <text x="550" y="18" text-anchor="middle" class="term gray xs">elma@tirana: ~</text>

  <!-- prompt -->
  <text x="20" y="58" class="term">
    <tspan class="green b">elma@tirana</tspan><tspan class="fg">:</tspan><tspan class="blue b">~</tspan><tspan class="fg">$ cat ai-integration.md</tspan>
  </text>

  <!-- markdown header -->
  <text x="20" y="92" class="term sm yellow b"># How I work with AI</text>
  <line x1="20" x2="1080" y1="106" y2="106" stroke="#3c3836" stroke-width="1"/>

  <!-- ===== PARAGRAPH 1 ===== -->
  <text x="20" y="138" class="term sm fg">AI is a real collaborator now, and pretending otherwise is a waste of everyone's time. But a collaborator</text>
  <text x="20" y="158" class="term sm fg">without a brief is just an expensive autocomplete. I run agents the way I run myself — give it a plan, give it</text>
  <text x="20" y="178" class="term sm fg">tools, demand a report back, review the diff. <tspan class="dim it">Vibe-coding</tspan> is a slur for people who refuse to read the output.</text>
  <text x="20" y="198" class="term sm fg">Claude Code, MCP servers, the API directly: I have used all three for real work, and the boring rule that beats</text>
  <text x="20" y="218" class="term sm fg">every clever trick is the same one that beats junior developers — write the spec first.</text>

  <!-- ===== PARAGRAPH 2 ===== -->
  <text x="20" y="254" class="term sm fg">I am a generalist on purpose, not by accident. Specialising too early is a way of asking the next ten years to</text>
  <text x="20" y="274" class="term sm fg">look exactly like the last one, and the last one was Django. Final-year CS, full-stack, freelance — the labels</text>
  <text x="20" y="294" class="term sm fg">are accurate, but they are not the point. The point is that I would rather learn the right tool for the problem</text>
  <text x="20" y="314" class="term sm fg">than force the problem into the tool I already know. That is the actual job. Everything else is dotfiles.</text>

  <!-- footer rule + meta -->
  <line x1="20" x2="1080" y1="338" y2="338" stroke="#3c3836" stroke-width="1"/>
  <text x="20" y="360" class="term sm">
    <tspan class="dim">~/ai-integration.md</tspan>  <tspan class="gray">·</tspan>  <tspan class="dim">last edited: 2026-05-03</tspan>  <tspan class="gray">·</tspan>  <tspan class="dim">end of file</tspan>  <tspan class="fg cursor">█</tspan>
  </text>
</svg>
